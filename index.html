<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hema's Cosmic Portfolio</title>
    <style>
        @keyframes space-move {
            from { background-position: 0 0; }
            to { background-position: 0 -1000px; }
        }

        body {
            background-color: #0b0d17;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: space-move 60s linear infinite;
            display: flex;
            flex-direction: column; /* Center column-ah maathunom to add WhatsApp button below */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 280px;
            text-align: center;
            transition: 0.5s ease;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card:hover {
            transform: translateY(-20px);
            border-color: #00fbff;
            box-shadow: 0 0 30px rgba(0, 251, 255, 0.2);
        }

        h2 { margin-bottom: 10px; font-size: 24px; }
        p { color: #ccc; font-size: 14px; margin-bottom: 25px; }

        .space-btn {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #4f5b93;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
        }

        .resume-btn:hover { background: #1e3a8a; border-color: #3b82f6; }
        .project-btn:hover { background: #581c87; border-color: #a855f7; }
        
        /* Hire Me Button Style */
        .hire-btn {
            margin-top: 40px;
            background: #25D366; 
            border-color: #128C7E;
            font-weight: bold;
        }
        .hire-btn:hover {
            background: #128C7E;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>MY RESUME</h2>
            <p>Check out my technical skills and professional journey as a Full Stack Developer.</p>
            <button class="space-btn resume-btn" id="resumeBtn">View Now</button>
        </div>

        <div class="card">
            <h2>PROJECT CODE</h2>
            <p>View the Python source code and Machine Learning logic for Fake News Detection.</p>
            <button class="space-btn project-btn" id="projectBtn">View Code</button>
        </div>
    </div>

    <a href="https://wa.me/919176234083?text=Hi%20Hema,%20I%20saw%20your%20portfolio%20and%20I%20want%20to%20create%20one%20for%20myself!" 
       target="_blank" class="space-btn hire-btn">
       🚀 Get Your Portfolio - Hire Me
    </a>

    <script>
        const resumeBtn = document.getElementById('resumeBtn');
        const projectBtn = document.getElementById('projectBtn');

        resumeBtn.addEventListener('click', function() {
            window.open("Hema-S-Resume-20260109.pdf", "_blank");
        });

        projectBtn.addEventListener('click', function() {
            window.open("https://github.com/hemalathas9644-dotcom/fake-news-project", "_blank");
        });
    </script>
</body>
</html>
